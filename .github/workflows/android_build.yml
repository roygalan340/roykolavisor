name: Compilar APK Roykola Visor Completo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Desempaquetar Proyecto Completo
      run: |
        if [ -f "./RoykolaVisor.zip" ]; then
          # Descomprimimos todo el contenido en la raíz del servidor
          unzip -o RoykolaVisor.zip -d ./temporal_extract
          
          # Movemos los archivos a la raíz real si venían dentro de una carpeta interna
          if [ -d "./temporal_extract/RoykolaVisor" ]; then
            cp -r ./temporal_extract/RoykolaVisor/* .
          else
            cp -r ./temporal_extract/* .
          fi
          
          # Limpiamos temporales para no confundir al compilador
          rm -rf temporal_extract
          rm -f RoykolaVisor.zip
          rm -f app.zip
        fi

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Instalar Gradle compatible automáticamente
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    - name: Compilar APK (Modo Debug)
      run: gradle :app:assembleDebug

    - name: Subir el archivo APK generado
      uses: actions/upload-artifact@v4
      with:
        name: Roykola-Visor-APK
        path: |
          **/build/outputs/apk/debug/*.apk
