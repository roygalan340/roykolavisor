name: Compilar APK Roykola Visor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Limpiar y preparar carpetas
      run: |
        if [ -f "./app.zip" ]; then
          # Descomprime el contenido
          unzip -o app.zip -d .
          # Si se creó una carpeta doble (app/app), movemos todo un nivel arriba
          if [ -d "./app/app" ]; then
            mv ./app/app/* ./app/ 2>/dev/null || true
          fi
          rm app.zip
        fi

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Dar permisos de ejecución al compilador Gradle
      run: chmod +x ./gradlew
      continue-on-error: true

    - name: Compilar APK (Modo Debug forzado)
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew :app:assembleDebug
        else
          gradle :app:assembleDebug
        fi

    - name: Subir el archivo APK generado
      uses: actions/upload-artifact@v4
      with:
        name: Roykola-Visor-APK
        path: |
          **/build/outputs/apk/debug/*.apk
